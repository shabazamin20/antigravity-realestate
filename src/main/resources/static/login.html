<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Antigravity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-text">Antigravity<span style="color:var(--orange);">.</span></div>
    </div>
    <h2 class="login-title">Welcome Back</h2>
    <p class="login-sub">Sign in to access the admin panel</p>

    <div id="errorMsg" style="display:none;" class="mb-3 p-3 rounded-3" style="background:#fff0f5;border:1px solid #f9a8d4;color:#e11d48;font-size:.875rem;">
      Invalid username or password.
    </div>

    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="admin" required/>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div style="position:relative;">
          <input type="password" name="password" id="passwordInput" class="form-control" placeholder="••••••••" required style="padding-right:3rem;"/>
          <button type="button" onclick="togglePassword()" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--zinc-400);cursor:pointer;font-size:.9rem;">
            👁
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary-admin w-100" style="justify-content:center;padding:.85rem;">
        Sign In
      </button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:.8rem;color:var(--zinc-500);">
      <a href="/" style="color:var(--orange);font-weight:600;">← Back to Website</a>
    </p>
    <p style="text-align:center;margin-top:.5rem;font-size:.75rem;color:var(--zinc-400);">
      Default: admin / admin123
    </p>
  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('passwordInput');
  input.type = input.type === 'password' ? 'text' : 'password';
}
const params = new URLSearchParams(window.location.search);
if (params.has('error')) {
  document.getElementById('errorMsg').style.display = 'block';
}
</script>
</body>
</html>
