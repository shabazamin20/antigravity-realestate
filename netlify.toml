[[redirects]]
  from = "/api/*"
  to = "https://antigravity-backend-production-affb.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/login"
  to = "https://antigravity-backend-production-affb.up.railway.app/login"
  status = 200
  force = true

[[redirects]]
  from = "/logout"
  to = "https://antigravity-backend-production-affb.up.railway.app/logout"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://antigravity-backend-production-affb.up.railway.app/uploads/:splat"
  status = 200
  force = true

[build]
  publish = "src/main/resources/static"
